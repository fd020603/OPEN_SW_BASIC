{% extends "base.html" %}

{% block content %}
<div class="auth-card">
    <h2>회원가입</h2>
    <form method="POST" action="{{ url_for('register') }}">
        <div class="form-group">
            <label for="user_id">아이디</label>
            <input type="text" id="user_id" name="user_id" required value="{{ user_id or '' }}">
        </div>
        <div class="form-group">
            <label for="nickname">닉네임</label>
            <input type="text" id="nickname" name="nickname" required value="{{ nickname or '' }}">
        </div>
        <div class="form-group">
            <label for="password">비밀번호</label>
            <input type="password" id="password" name="password" required aria-describedby="passwordHelp">
            <div id="passwordHelp" class="password-help">
                <p class="rule" id="rule-length">• 최소 글자수 8글자</p>
                <p class="rule" id="rule-special">• 특수문자 포함</p>
            </div>
            {% if password_errors %}
                <div class="password-server-errors" style="margin-top:6px;">
                    {% for err in password_errors %}
                        <p class="text-danger" style="font-size:0.85rem;margin:2px 0;">{{ err }}</p>
                    {% endfor %}
                </div>
            {% endif %}
        </div>
        <button type="submit" class="btn btn-primary btn-block">가입 완료</button>
    </form>
</div>

<script>
// 비밀번호 규칙 검사 (클라이언트 사이드)
(function(){
    const form = document.querySelector('form[action="{{ url_for('register') }}"]');
    const password = document.getElementById('password');
    const ruleLength = document.getElementById('rule-length');
    const ruleSpecial = document.getElementById('rule-special');

    function hasMinLength(v){ return v.length >= 8; }
    function hasSpecialChar(v){ return /[^A-Za-z0-9]/.test(v); }

    function update(){
        const v = password.value || '';
        const okLen = hasMinLength(v);
        const okSpec = hasSpecialChar(v);

        ruleLength.classList.toggle('failed', !okLen);
        ruleLength.classList.toggle('passed', okLen);

        ruleSpecial.classList.toggle('failed', !okSpec);
        ruleSpecial.classList.toggle('passed', okSpec);

        if(okLen && okSpec){
            password.removeAttribute('aria-invalid');
        } else {
            password.setAttribute('aria-invalid', 'true');
        }
        return okLen && okSpec;
    }

    password.addEventListener('input', update);

    form.addEventListener('submit', function(e){
        if(!update()){
            e.preventDefault();
            password.focus();
        }
    });

    // 초기 상태
    update();
})();
</script>
{% endblock %}
